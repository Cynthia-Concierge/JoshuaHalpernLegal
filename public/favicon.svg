<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- LH monogram - exact match to brand logo -->
  <!-- L vertical (left bar, full height) -->
  <rect x="10" y="2" width="8" height="60" fill="#F5A623"/>
  <!-- H crossbar (upper-middle area) -->
  <rect x="18" y="24" width="20" height="8" fill="#F5A623"/>
  <!-- H right bar (starts at crossbar, goes to bottom) -->
  <rect x="38" y="24" width="8" height="38" fill="#F5A623"/>
  <!-- L bottom bar (connects left bar to right bar at bottom) -->
  <rect x="18" y="54" width="20" height="8" fill="#F5A623"/>
</svg>
